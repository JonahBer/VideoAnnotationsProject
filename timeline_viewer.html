<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Annotation Timeline Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,700;9..144,900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0e1014;
    --panel:        #161922;
    --panel-2:      #1d2230;
    --ink:          #e8ecf3;
    --ink-dim:      #8b93a7;
    --ink-faint:    #4a5267;
    --line:         #262b3a;

    --no:           #2a3040;
    --no-edge:      #353c52;
    --yes:          #f0b429;
    --yes-glow:     #f0b42955;
    --perfect:      #21d07a;
    --perfect-glow: #21d07a66;

    --accent:       #6ea8ff;
    --danger:       #ff6b6b;

    --radius:       4px;
    --shadow-lg:    0 30px 60px -20px rgba(0,0,0,.55), 0 10px 25px -10px rgba(0,0,0,.4);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', ui-monospace, Menlo, monospace;
    font-size: 13px;
    line-height: 1.5;
    min-height: 100vh;
  }

  body {
    background:
      radial-gradient(1100px 600px at 85% -10%, rgba(110,168,255,.10), transparent 60%),
      radial-gradient(900px 500px at -5% 105%, rgba(33,208,122,.07), transparent 60%),
      var(--bg);
  }

  .wrap {
    max-width: 1480px;
    margin: 0 auto;
    padding: 36px 32px 80px;
  }

  /* ---------- Header ---------- */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--line);
  }
  .title-block h1 {
    font-family: 'Fraunces', serif;
    font-weight: 900;
    font-size: 44px;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
    line-height: 1;
  }
  .title-block h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .title-block p {
    margin: 0;
    color: var(--ink-dim);
    font-size: 12px;
    letter-spacing: 0.04em;
  }

  .legend {
    display: flex;
    gap: 18px;
    align-items: center;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .legend .swatch {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .legend .dot {
    width: 14px; height: 14px;
    border-radius: 2px;
    display: inline-block;
  }
  .legend .dot.no      { background: var(--no); border: 1px solid var(--no-edge); }
  .legend .dot.yes     { background: var(--yes); box-shadow: 0 0 12px var(--yes-glow); }
  .legend .dot.perfect { background: var(--perfect); box-shadow: 0 0 14px var(--perfect-glow); }

  /* ---------- Controls ---------- */
  .controls {
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 22px;
    margin-bottom: 28px;
  }
  @media (max-width: 960px) {
    .controls { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 18px;
  }
  .panel h3 {
    margin: 0 0 12px;
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 14px;
    letter-spacing: 0.04em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  textarea {
    width: 100%;
    min-height: 140px;
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 10px 12px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    line-height: 1.5;
    resize: vertical;
    outline: none;
  }
  textarea:focus { border-color: var(--accent); }

  .btn-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    flex-wrap: wrap;
  }
  button, .file-label {
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 8px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all .15s ease;
  }
  button:hover, .file-label:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  button.primary {
    background: var(--accent);
    color: #0b1020;
    border-color: var(--accent);
    font-weight: 700;
  }
  button.primary:hover {
    background: #8fbcff;
    color: #0b1020;
  }
  input[type="file"] { display: none; }

  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 16px;
    font-size: 12px;
  }
  .options label {
    display: flex;
    flex-direction: column;
    gap: 4px;
    color: var(--ink-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  .options input[type="number"],
  .options select {
    background: var(--panel-2);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 3px;
    padding: 6px 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    outline: none;
  }
  .options input[type="number"]:focus,
  .options select:focus { border-color: var(--accent); }

  .toggle {
    display: flex; align-items: center; gap: 8px;
    text-transform: none; letter-spacing: 0;
    font-size: 12px; color: var(--ink);
    cursor: pointer; user-select: none;
  }

  /* ---------- Stats strip ---------- */
  .stats {
    display: flex;
    gap: 0;
    margin-bottom: 22px;
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .stat {
    flex: 1;
    padding: 14px 18px;
    background: var(--panel);
    border-right: 1px solid var(--line);
  }
  .stat:last-child { border-right: none; }
  .stat .label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }
  .stat .value {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .stat .value .unit {
    font-size: 13px;
    color: var(--ink-dim);
    margin-left: 4px;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ---------- Timeline rows ---------- */
  .rows {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .row {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 18px;
    transition: border-color .15s ease;
  }
  .row:hover { border-color: #323849; }
  .row-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 10px;
  }
  .name {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 17px;
    letter-spacing: -0.005em;
    color: var(--ink);
    word-break: break-all;
  }
  .meta {
    display: flex;
    gap: 14px;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--ink-dim);
    text-transform: uppercase;
    flex-shrink: 0;
  }
  .meta .pill {
    display: inline-flex; align-items: center; gap: 5px;
  }
  .meta .pill .mini {
    width: 8px; height: 8px; border-radius: 50%;
    display: inline-block;
  }
  .meta .mini.no      { background: var(--no-edge); }
  .meta .mini.yes     { background: var(--yes); }
  .meta .mini.perfect { background: var(--perfect); }

  /* The bar */
  .bar-frame {
    position: relative;
    height: 36px;
    background: var(--panel-2);
    border: 1px solid var(--line);
    border-radius: 3px;
    overflow: hidden;
    display: flex;
  }
  .seg {
    height: 100%;
    flex: 1 1 0;
    min-width: 0;
    border-right: 1px solid rgba(255,255,255,.025);
  }
  .seg:last-child { border-right: none; }
  .seg.empty   { background: transparent; }
  .seg.no      { background: rgba(255,255,255,.045); }
  .seg.yes     { background: var(--yes); box-shadow: inset 0 0 8px rgba(0,0,0,.25); }
  .seg.perfect { background: var(--perfect); box-shadow: inset 0 0 10px rgba(0,0,0,.25); }

  /* hover tooltip via title attribute is fine, but build a richer one */
  .seg { cursor: crosshair; }
  .seg:hover { filter: brightness(1.25); outline: 1px solid rgba(255,255,255,.4); outline-offset: -1px; }

  /* Time axis */
  .axis {
    position: relative;
    height: 18px;
    margin-top: 6px;
    color: var(--ink-faint);
    font-size: 10px;
    letter-spacing: 0.04em;
  }
  .tick {
    position: absolute;
    top: 0;
    transform: translateX(-50%);
    white-space: nowrap;
  }
  .tick::before {
    content: "";
    display: block;
    width: 1px; height: 4px;
    background: var(--ink-faint);
    margin: 0 auto 2px;
  }

  /* Empty + error states */
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--ink-dim);
    border: 1px dashed var(--line);
    border-radius: var(--radius);
  }
  .empty .big {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 22px;
    margin-bottom: 6px;
    color: var(--ink);
  }
  .err {
    color: var(--danger);
    font-size: 12px;
    margin-top: 8px;
    min-height: 18px;
  }

  /* Tooltip floating */
  .tooltip {
    position: fixed;
    pointer-events: none;
    background: #0b0d12;
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 8px 10px;
    border-radius: 3px;
    font-size: 11px;
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transition: opacity .1s ease;
    z-index: 100;
    white-space: nowrap;
  }
  .tooltip.show { opacity: 1; }
  .tooltip .lab {
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-right: 6px;
  }
  .tooltip .lab.no      { color: var(--ink-dim); }
  .tooltip .lab.yes     { color: var(--yes); }
  .tooltip .lab.perfect { color: var(--perfect); }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="title-block">
      <h1>Annotation <em>Timelines</em></h1>
      <p>Color-coded view of per-video labels — no · yes · perfect</p>
    </div>
    <div class="legend">
      <span class="swatch"><span class="dot no"></span> no</span>
      <span class="swatch"><span class="dot yes"></span> yes</span>
      <span class="swatch"><span class="dot perfect"></span> perfect</span>
    </div>
  </header>

  <div class="controls">
    <div class="panel">
      <h3>Input data</h3>
      <textarea id="input" spellcheck="false" placeholder="Paste annotations or bars_output.txt here…
Examples accepted:
  video.mp4 | 00:00:12.345=yes, 00:01:00.000=no, 00:01:30.000=perfect
  video.mp4 | [   o o O    o   O o   ]"></textarea>
      <div class="btn-row">
        <label class="file-label" for="file">Load file…</label>
        <input id="file" type="file" accept=".txt,text/plain" />
        <button id="loadSample">Load sample</button>
        <button id="clear">Clear</button>
        <button id="render" class="primary">Render →</button>
      </div>
      <div class="err" id="err"></div>
    </div>

    <div class="panel">
      <h3>Options</h3>
      <div class="options">
        <label>
          Bar resolution
          <input id="width" type="number" min="40" max="2000" step="10" value="300" />
        </label>
        <label>
          Sort by
          <select id="sort">
            <option value="input">Input order</option>
            <option value="name">Name (A→Z)</option>
            <option value="duration">Duration (long→short)</option>
            <option value="perfectPct">% perfect (high→low)</option>
            <option value="yesPct">% yes (high→low)</option>
          </select>
        </label>
        <label class="toggle" style="grid-column: 1 / -1; margin-top: 4px;">
          <input type="checkbox" id="showAxis" checked /> Show time axis
        </label>
        <label class="toggle" style="grid-column: 1 / -1;">
          <input type="checkbox" id="unlabeledNo" /> Treat unlabeled bins as "no"
        </label>
      </div>
    </div>
  </div>

  <div class="stats" id="stats" style="display:none;">
    <div class="stat"><div class="label">Videos</div><div class="value" id="s-videos">0</div></div>
    <div class="stat"><div class="label">Annotations</div><div class="value" id="s-anns">0</div></div>
    <div class="stat"><div class="label">Perfect</div><div class="value" id="s-perfect">0<span class="unit">%</span></div></div>
    <div class="stat"><div class="label">Yes</div><div class="value" id="s-yes">0<span class="unit">%</span></div></div>
    <div class="stat"><div class="label">Total duration</div><div class="value" id="s-dur">0<span class="unit">s</span></div></div>
  </div>

  <div id="output" class="rows">
    <div class="empty">
      <div class="big">No timelines yet</div>
      <div>Paste your annotation lines or load a file, then hit <strong style="color:var(--accent)">Render</strong>.</div>
    </div>
  </div>

</div>

<div class="tooltip" id="tooltip"></div>

<script>
(() => {
  const VALID_LABELS = new Set(['no', 'yes', 'perfect']);
  const LABEL_RANK = { no: 1, yes: 2, perfect: 3 };
  const TS_RE = /^(\d{2}):(\d{2}):(\d{2})\.(\d{3})$/;

  // ----- parsing helpers -----
  function tsToSec(ts) {
    ts = ts.trim();
    const m = TS_RE.exec(ts);
    if (m) {
      return (+m[1])*3600 + (+m[2])*60 + (+m[3]) + (+m[4])/1000;
    }
    // fallbacks
    const parts = ts.split(':');
    try {
      if (parts.length === 3) return +parts[0]*3600 + +parts[1]*60 + parseFloat(parts[2]);
      if (parts.length === 2) return +parts[0]*60 + parseFloat(parts[1]);
      return parseFloat(parts[0]) || 0;
    } catch { return 0; }
  }

  function fmtTime(sec) {
    sec = Math.max(0, sec);
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    const s = sec % 60;
    if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${s.toFixed(2).padStart(5,'0')}`;
    return `${m}:${s.toFixed(2).padStart(5,'0')}`;
  }

  // Detect: bars line ("[...]") vs annotation line ("ts=label, ...")
  function parseLine(rawLine) {
    const idx = rawLine.indexOf('|');
    if (idx < 0) return null;
    const name = rawLine.slice(0, idx).trim();
    const rest = rawLine.slice(idx + 1).trim();
    if (!name || !rest) return null;

    // Pre-built bar from the python script's output.
    // Python writes (FILL_MODE='blank'):
    //    '-' = slot never touched (truly unlabeled)
    //    ' ' = 'no' annotation landed here
    //    'o' = 'yes'
    //    'O' = 'perfect'
    // Older docstring legend also used: '-' no, '=' yes, '+' perfect.
    if (rest.startsWith('[') && rest.endsWith(']')) {
      const inside = rest.slice(1, -1);
      const labels = [];
      for (const ch of inside) {
        if (ch === 'O' || ch === '+') labels.push('perfect');
        else if (ch === 'o' || ch === '=') labels.push('yes');
        else if (ch === ' ') labels.push('no');
        else labels.push('empty'); // '-' or anything else
      }
      return { name, kind: 'prebuilt', labels };
    }

    // Annotation line
    const tsMap = {};   // last-write-wins by string key, matches python behavior
    const chunks = rest.split(',');
    for (let chunk of chunks) {
      chunk = chunk.trim();
      if (!chunk || !chunk.includes('=')) continue;
      const eq = chunk.indexOf('=');
      const ts = chunk.slice(0, eq).trim();
      const lab = chunk.slice(eq + 1).trim().toLowerCase();
      if (ts && VALID_LABELS.has(lab)) tsMap[ts] = lab;
    }
    if (Object.keys(tsMap).length === 0) return null;
    return { name, kind: 'annotations', tsMap };
  }

  // Build slot array of labels for one video.
  // Mirrors python: duration = max ts (>= 0.001), idx = round(t/dur * (W-1))
  // collision precedence: perfect > yes > no.
  // Slot values: 'empty' (never touched) | 'no' | 'yes' | 'perfect'
  // unlabeledAsNo collapses 'empty' -> 'no' visually.
  function buildSlots(entry, width, unlabeledAsNo) {
    if (entry.kind === 'prebuilt') {
      // For prebuilt bars from the python output, the slot count IS the bar length.
      // Just normalize to requested width by nearest-neighbor sampling.
      const src = entry.labels;
      if (src.length === 0) {
        return { slots: new Array(width).fill('empty'), duration: null, counts: {no:0,yes:0,perfect:0}, annCount: 0 };
      }
      const slots = new Array(width);
      for (let i = 0; i < width; i++) {
        const j = Math.round((i / (width - 1 || 1)) * (src.length - 1));
        slots[i] = src[j]; // src already in {'no','yes','perfect'}
      }
      if (unlabeledAsNo) {
        for (let i = 0; i < width; i++) if (slots[i] === 'empty') slots[i] = 'no';
      }
      // We don't have annotation counts for prebuilt bars; count slot occurrences as a proxy.
      const counts = { no: 0, yes: 0, perfect: 0 };
      for (const s of src) if (counts[s] !== undefined) counts[s]++;
      return { slots, duration: null, counts, annCount: src.length };
    }

    // Annotations path — mirrors python script's build_ascii_timeline_for_line.
    const tsMap = entry.tsMap;
    const entries = Object.entries(tsMap).map(([ts, lab]) => [tsToSec(ts), lab]);
    const maxTs = entries.reduce((a, [t]) => Math.max(a, t), 0);
    const duration = Math.max(0.001, maxTs);

    // FILL_MODE='blank' in python: slots start as '-' (rank 0), and 'no' (rank 1) overwrites.
    // We represent 'empty' as a distinct slot value so the UI can render it subtly differently.
    const slots = new Array(width).fill(unlabeledAsNo ? 'no' : 'empty');
    const ranks = new Array(width).fill(unlabeledAsNo ? LABEL_RANK.no : 0);

    const counts = { no: 0, yes: 0, perfect: 0 };
    for (const [t, lab] of entries) {
      counts[lab]++;
      const tc = Math.max(0, Math.min(duration, t));
      let idx = Math.round((tc / duration) * (width - 1));
      idx = Math.max(0, Math.min(width - 1, idx));
      if (LABEL_RANK[lab] >= ranks[idx]) {
        slots[idx] = lab;
        ranks[idx] = LABEL_RANK[lab];
      }
    }
    return { slots, duration, counts, annCount: entries.length };
  }

  function countAnnotations(entry) {
    if (entry.kind !== 'annotations') return { no: 0, yes: 0, perfect: 0 };
    const c = { no: 0, yes: 0, perfect: 0 };
    for (const lab of Object.values(entry.tsMap)) c[lab]++;
    return c;
  }

  // ----- rendering -----
  function renderRuns(slots) {
    // Collapse runs of identical label into a single flex segment for fewer DOM nodes.
    const frag = document.createDocumentFragment();
    if (slots.length === 0) return frag;
    let curLab = slots[0];
    let curLen = 1;
    const total = slots.length;
    const flush = (lab, len, startIdx) => {
      const seg = document.createElement('div');
      seg.className = 'seg ' + lab;
      seg.style.flexGrow = String(len);
      seg.dataset.lab = lab;
      seg.dataset.start = String(startIdx);
      seg.dataset.end = String(startIdx + len - 1);
      seg.dataset.total = String(total);
      frag.appendChild(seg);
    };
    let startIdx = 0;
    for (let i = 1; i < slots.length; i++) {
      if (slots[i] === curLab) { curLen++; continue; }
      flush(curLab, curLen, startIdx);
      startIdx = i;
      curLab = slots[i];
      curLen = 1;
    }
    flush(curLab, curLen, startIdx);
    return frag;
  }

  function buildAxis(duration, width) {
    const axis = document.createElement('div');
    axis.className = 'axis';
    if (!duration || duration <= 0) {
      const t = document.createElement('div');
      t.className = 'tick';
      t.style.left = '0%';
      t.textContent = 'start';
      axis.appendChild(t);
      const e = document.createElement('div');
      e.className = 'tick';
      e.style.left = '100%';
      e.textContent = 'end';
      axis.appendChild(e);
      return axis;
    }
    // 5 ticks: 0, 25, 50, 75, 100
    for (const p of [0, 0.25, 0.5, 0.75, 1]) {
      const t = document.createElement('div');
      t.className = 'tick';
      t.style.left = (p * 100) + '%';
      t.textContent = fmtTime(duration * p);
      axis.appendChild(t);
    }
    return axis;
  }

  function renderAll(entries) {
    const out = document.getElementById('output');
    out.innerHTML = '';

    if (entries.length === 0) {
      const e = document.createElement('div');
      e.className = 'empty';
      e.innerHTML = '<div class="big">No valid lines parsed</div><div>Check that each line uses the <code>name | ts=label, …</code> format.</div>';
      out.appendChild(e);
      document.getElementById('stats').style.display = 'none';
      return;
    }

    const width = clampInt(document.getElementById('width').value, 40, 2000, 300);
    const showAxis = document.getElementById('showAxis').checked;
    const unlabeledAsNo = document.getElementById('unlabeledNo').checked;
    const sortMode = document.getElementById('sort').value;

    // Build rows
    const computed = entries.map(e => {
      const built = buildSlots(e, width, unlabeledAsNo);
      const perfectPct = built.annCount > 0 ? (built.counts.perfect / built.annCount) * 100 : 0;
      const yesPct = built.annCount > 0 ? (built.counts.yes / built.annCount) * 100 : 0;
      return { entry: e, built, perfectPct, yesPct };
    });

    if (sortMode === 'name') computed.sort((a,b) => a.entry.name.localeCompare(b.entry.name));
    else if (sortMode === 'duration') computed.sort((a,b) => (b.built.duration||0) - (a.built.duration||0));
    else if (sortMode === 'perfectPct') computed.sort((a,b) => b.perfectPct - a.perfectPct);
    else if (sortMode === 'yesPct') computed.sort((a,b) => b.yesPct - a.yesPct);

    let totalAnns = 0, totalPerfect = 0, totalYes = 0, totalDur = 0;

    for (const { entry, built } of computed) {
      const row = document.createElement('div');
      row.className = 'row';

      const head = document.createElement('div');
      head.className = 'row-head';

      const name = document.createElement('div');
      name.className = 'name';
      name.textContent = entry.name;

      const meta = document.createElement('div');
      meta.className = 'meta';
      const durTxt = built.duration != null ? fmtTime(built.duration) : '—';
      meta.innerHTML = `
        <span class="pill">⏱ ${durTxt}</span>
        <span class="pill"><span class="mini perfect"></span>${built.counts.perfect}</span>
        <span class="pill"><span class="mini yes"></span>${built.counts.yes}</span>
        <span class="pill"><span class="mini no"></span>${built.counts.no}</span>
      `;
      head.appendChild(name);
      head.appendChild(meta);

      const frame = document.createElement('div');
      frame.className = 'bar-frame';
      frame.appendChild(renderRuns(built.slots));

      row.appendChild(head);
      row.appendChild(frame);
      if (showAxis) row.appendChild(buildAxis(built.duration, width));

      out.appendChild(row);

      totalAnns += built.annCount;
      totalPerfect += built.counts.perfect;
      totalYes += built.counts.yes;
      if (built.duration) totalDur += built.duration;

      // Hover tooltip wiring
      frame.addEventListener('mousemove', onSegHover);
      frame.addEventListener('mouseleave', hideTooltip);
    }

    // Stats
    document.getElementById('stats').style.display = '';
    document.getElementById('s-videos').textContent = String(computed.length);
    document.getElementById('s-anns').textContent = String(totalAnns);
    const pctPerfect = totalAnns ? (totalPerfect / totalAnns * 100) : 0;
    const pctYes = totalAnns ? (totalYes / totalAnns * 100) : 0;
    document.getElementById('s-perfect').innerHTML = `${pctPerfect.toFixed(1)}<span class="unit">%</span>`;
    document.getElementById('s-yes').innerHTML = `${pctYes.toFixed(1)}<span class="unit">%</span>`;
    document.getElementById('s-dur').innerHTML = `${fmtTime(totalDur)}<span class="unit"></span>`;
  }

  function clampInt(v, lo, hi, fallback) {
    const n = parseInt(v, 10);
    if (Number.isNaN(n)) return fallback;
    return Math.max(lo, Math.min(hi, n));
  }

  // ----- tooltip -----
  const tooltipEl = document.getElementById('tooltip');
  function onSegHover(e) {
    const target = e.target.closest('.seg');
    if (!target) { hideTooltip(); return; }
    const lab = target.dataset.lab;
    const start = +target.dataset.start;
    const end = +target.dataset.end;
    const total = +target.dataset.total;
    // Find this row's duration via the axis ticks (we encoded fmt). Easier: derive from row.
    const row = target.closest('.row');
    // approximate the segment center time using width
    const center = ((start + end) / 2) / Math.max(1, total - 1);
    const durText = row?.querySelector('.meta .pill')?.textContent?.replace('⏱', '').trim() || '';
    // Convert displayed duration string back to seconds for accurate display
    let durSec = parseDurStr(durText);
    let timeStr = '';
    if (!Number.isNaN(durSec) && durSec > 0) {
      timeStr = ` · ${fmtTime(durSec * center)}`;
    }
    const segPct = ((end - start + 1) / total * 100).toFixed(1);
    tooltipEl.innerHTML = `<span class="lab ${lab}">${lab}</span>${timeStr} · ${segPct}% wide`;
    tooltipEl.classList.add('show');
    positionTooltip(e);
  }
  function positionTooltip(e) {
    const pad = 14;
    let x = e.clientX + pad;
    let y = e.clientY + pad;
    const tw = tooltipEl.offsetWidth;
    const th = tooltipEl.offsetHeight;
    if (x + tw + pad > window.innerWidth) x = e.clientX - tw - pad;
    if (y + th + pad > window.innerHeight) y = e.clientY - th - pad;
    tooltipEl.style.left = x + 'px';
    tooltipEl.style.top = y + 'px';
  }
  function hideTooltip() { tooltipEl.classList.remove('show'); }
  document.addEventListener('mousemove', e => {
    if (tooltipEl.classList.contains('show')) positionTooltip(e);
  });
  function parseDurStr(s) {
    if (!s) return NaN;
    const parts = s.split(':');
    try {
      if (parts.length === 3) return +parts[0]*3600 + +parts[1]*60 + parseFloat(parts[2]);
      if (parts.length === 2) return +parts[0]*60 + parseFloat(parts[1]);
      return parseFloat(parts[0]);
    } catch { return NaN; }
  }

  // ----- input handling -----
  function parseInput(text) {
    const out = [];
    const lines = text.split(/\r?\n/);
    for (const raw of lines) {
      const line = raw.trim();
      if (!line) continue;
      const parsed = parseLine(line);
      if (parsed) out.push(parsed);
    }
    return out;
  }

  document.getElementById('render').addEventListener('click', () => {
    const text = document.getElementById('input').value;
    const errEl = document.getElementById('err');
    errEl.textContent = '';
    const entries = parseInput(text);
    if (entries.length === 0 && text.trim().length > 0) {
      errEl.textContent = 'Could not parse any lines. Each line should look like:  name | 00:00:01.000=yes, ...';
    }
    renderAll(entries);
  });

  document.getElementById('clear').addEventListener('click', () => {
    document.getElementById('input').value = '';
    document.getElementById('err').textContent = '';
    document.getElementById('output').innerHTML =
      '<div class="empty"><div class="big">No timelines yet</div><div>Paste your annotation lines or load a file, then hit <strong style="color:var(--accent)">Render</strong>.</div></div>';
    document.getElementById('stats').style.display = 'none';
  });

  document.getElementById('file').addEventListener('change', async (e) => {
    const f = e.target.files?.[0];
    if (!f) return;
    const text = await f.text();
    document.getElementById('input').value = text;
    document.getElementById('render').click();
  });

  const SAMPLE = `intro_clip.mp4 | 00:00:02.000=no, 00:00:08.500=yes, 00:00:15.200=perfect, 00:00:22.000=yes, 00:00:30.000=no, 00:00:45.500=perfect, 00:01:02.000=yes, 00:01:18.000=no, 00:01:35.000=perfect, 00:01:50.000=yes
podcast_ep42.mkv | 00:00:30.000=no, 00:05:12.000=yes, 00:12:45.500=perfect, 00:18:22.000=yes, 00:25:00.000=yes, 00:32:15.000=perfect, 00:41:30.000=no, 00:48:55.000=yes, 00:55:10.000=perfect, 01:02:00.000=yes, 01:10:30.000=no, 01:18:00.000=perfect
tutorial_short.mp4 | 00:00:05.000=yes, 00:00:12.000=perfect, 00:00:20.000=yes, 00:00:28.000=no, 00:00:35.000=yes, 00:00:42.000=perfect, 00:00:50.000=yes
long_lecture.mp4 | 00:01:00.000=no, 00:08:30.000=yes, 00:15:00.000=perfect, 00:22:45.000=yes, 00:30:00.000=no, 00:38:20.000=yes, 00:45:50.000=perfect, 00:55:30.000=yes, 01:05:00.000=no, 01:12:30.000=perfect, 01:20:00.000=yes, 01:30:15.000=perfect, 01:42:00.000=yes, 01:55:00.000=no
quick_test.webm | 00:00:01.000=perfect, 00:00:03.500=yes, 00:00:07.000=no, 00:00:10.000=perfect`;

  document.getElementById('loadSample').addEventListener('click', () => {
    document.getElementById('input').value = SAMPLE;
    document.getElementById('render').click();
  });

  // Re-render on option change
  for (const id of ['width', 'sort', 'showAxis', 'unlabeledNo']) {
    document.getElementById(id).addEventListener('change', () => {
      if (document.getElementById('input').value.trim()) document.getElementById('render').click();
    });
  }

  // Auto-load sample on first open
  window.addEventListener('DOMContentLoaded', () => {
    document.getElementById('input').value = SAMPLE;
    document.getElementById('render').click();
  });
})();
</script>
</body>
</html>
